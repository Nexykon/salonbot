<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervacija termina</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --purple: #7c3aed;
    --purple-light: #a855f7;
    --cyan: #06b6d4;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }

  /* Background gradient */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 60%);
  }

  /* Header */
  .header {
    padding: 24px 20px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 1.3rem; font-weight: 700; }
  .header h1 span { background: linear-gradient(135deg, var(--purple-light), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .salon-name { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

  /* Tab switcher */
  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin: 20px auto;
    max-width: 400px;
    width: calc(100% - 40px);
  }
  .tab-btn {
    flex: 1; padding: 10px; border: none; background: none;
    color: var(--muted); font-size: 0.9rem; font-weight: 600;
    border-radius: 9px; cursor: pointer; transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--purple);
    color: white;
  }

  /* Main content */
  .container { max-width: 520px; margin: 0 auto; padding: 0 20px 40px; }

  /* ─── Booking flow ─────────────────────── */
  .step { display: none; animation: fadeIn 0.25s ease; }
  .step.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Step indicator */
  .step-indicator {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin: 24px 0 20px;
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); transition: all 0.3s;
  }
  .step-dot.active { background: var(--purple); transform: scale(1.4); }
  .step-dot.done { background: var(--green); }
  .step-label {
    font-size: 0.8rem; color: var(--muted);
    text-align: center; margin-bottom: 20px;
  }
  .step-label strong { color: var(--text); }

  /* Section titles */
  .section-title {
    font-size: 1.1rem; font-weight: 700; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .emoji { font-size: 1.3rem; }

  /* Service cards */
  .services-grid { display: flex; flex-direction: column; gap: 10px; }
  .service-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .service-card:hover, .service-card.selected {
    border-color: var(--purple);
    background: rgba(124,58,237,0.12);
  }
  .service-card.selected { box-shadow: 0 0 0 1px var(--purple); }
  .svc-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
  .svc-info p { font-size: 0.82rem; color: var(--muted); }
  .svc-price {
    font-size: 1.1rem; font-weight: 700;
    color: var(--purple-light);
    white-space: nowrap;
  }

  /* Calendar */
  .calendar-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-nav {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text); cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .cal-nav:hover { background: var(--purple); border-color: var(--purple); }
  .cal-month { font-size: 1rem; font-weight: 700; }
  .calendar-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .cal-day-header {
    text-align: center; font-size: 0.7rem; color: var(--muted);
    padding: 4px 0; font-weight: 600; text-transform: uppercase;
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 10px; font-size: 0.85rem; font-weight: 500;
    cursor: default; transition: all 0.15s; position: relative;
  }
  .cal-day.empty { background: none; }
  .cal-day.unavailable { color: rgba(255,255,255,0.2); }
  .cal-day.available {
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    color: var(--text); cursor: pointer;
  }
  .cal-day.available:hover {
    background: var(--purple);
    border-color: var(--purple);
    transform: scale(1.1);
  }
  .cal-day.selected {
    background: var(--purple) !important;
    border-color: var(--purple) !important;
    transform: scale(1.1);
    box-shadow: 0 0 16px rgba(124,58,237,0.5);
  }
  .cal-day.today { font-weight: 800; }
  .cal-day.today::after {
    content: ''; position: absolute; bottom: 3px;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--cyan);
  }

  /* Time slots */
  .times-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin-top: 8px;
  }
  .time-chip {
    padding: 12px 8px; text-align: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; cursor: pointer; font-size: 0.95rem;
    font-weight: 600; transition: all 0.15s;
  }
  .time-chip:hover, .time-chip.selected {
    background: var(--purple); border-color: var(--purple); color: white;
  }
  .time-chip.selected { box-shadow: 0 0 12px rgba(124,58,237,0.4); }

  /* Form */
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .form-group input {
    width: 100%; padding: 14px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 1rem;
    outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--purple); }
  .form-group input::placeholder { color: var(--muted); }

  /* Summary card */
  .summary-card {
    background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: var(--radius); padding: 16px;
    margin-bottom: 20px;
  }
  .summary-card .summary-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0; font-size: 0.9rem;
  }
  .summary-card .summary-row:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.06); }
  .summary-card .summary-label { color: var(--muted); min-width: 80px; }
  .summary-card .summary-val { font-weight: 600; }

  /* Buttons */
  .btn {
    width: 100%; padding: 15px;
    border: none; border-radius: 14px;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.3px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--purple), var(--purple-light));
    color: white; box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,58,237,0.5); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); margin-top: 10px;
  }
  .btn-secondary:hover { border-color: var(--purple); color: var(--text); }

  /* Success screen */
  .success-screen {
    text-align: center; padding: 40px 20px;
    animation: fadeIn 0.4s ease;
  }
  .success-icon {
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(34,197,94,0.15); border: 2px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; margin: 0 auto 24px;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .success-screen h2 { font-size: 1.5rem; margin-bottom: 8px; }
  .success-screen p { color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
  .ref-badge {
    display: inline-block; padding: 8px 20px;
    background: rgba(124,58,237,0.2); border: 1px solid var(--purple);
    border-radius: 999px; font-size: 1.1rem; font-weight: 700;
    letter-spacing: 2px; color: var(--purple-light);
    margin-bottom: 24px;
  }

  /* ─── My bookings ──────────────────────── */
  .my-bookings { display: none; }
  .my-bookings.active { display: block; }

  .phone-lookup { margin: 24px 0; }
  .phone-lookup .form-group { margin-bottom: 12px; }

  .booking-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .booking-card:hover { border-color: rgba(124,58,237,0.4); }
  .booking-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 12px;
  }
  .booking-date { font-size: 1rem; font-weight: 700; }
  .booking-time { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }
  .status-badge {
    padding: 4px 10px; border-radius: 999px;
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .status-badge.pending { background: rgba(234,179,8,0.15); color: var(--yellow); border: 1px solid rgba(234,179,8,0.3); }
  .status-badge.confirmed { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .status-badge.cancelled { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .booking-ref { font-size: 0.78rem; color: var(--muted); font-family: monospace; margin-top: 6px; }

  .btn-cancel-booking {
    width: 100%; padding: 10px; margin-top: 12px;
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
    border-radius: 10px; color: var(--red); font-size: 0.85rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel-booking:hover {
    background: rgba(239,68,68,0.15); border-color: var(--red);
  }

  /* Loading + empty states */
  .loader {
    text-align: center; padding: 40px 0;
    color: var(--muted); font-size: 0.9rem;
  }
  .loader::after { content: ''; display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-left: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 40px 0; color: var(--muted); }
  .empty-state .emoji { font-size: 3rem; display: block; margin-bottom: 12px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1e1e2e; border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 20px;
    font-size: 0.9rem; font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 9999; transition: all 0.3s;
    opacity: 0; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.error { border-color: var(--red); color: var(--red); }
  .toast.success { border-color: var(--green); color: var(--green); }

  /* Responsive */
  @media (min-width: 480px) {
    .times-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📅 <span id="salon-title">Naročanje</span></h1>
  <p class="salon-name" id="salon-subtitle">Spletno naročanje</p>
</div>

<!-- Tab switcher -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('book')">📅 Nova rezervacija</button>
  <button class="tab-btn" onclick="switchTab('my')">📋 Moje rezervacije</button>
</div>

<div class="container">

  <!-- ══════ BOOKING FLOW ══════ -->
  <div id="tab-book">

    <!-- Step indicator -->
    <div class="step-indicator">
      <div class="step-dot active" id="dot-1"></div>
      <div class="step-dot" id="dot-2"></div>
      <div class="step-dot" id="dot-3"></div>
      <div class="step-dot" id="dot-4"></div>
    </div>
    <p class="step-label" id="step-label">Korak <strong>1</strong> od 4</p>

    <!-- Step 1: Service -->
    <div class="step active" id="step-1">
      <div class="section-title"><span class="emoji">📅</span> Izberite storitev</div>
      <div class="services-grid" id="services-list">
        <div class="loader">Nalagam storitve</div>
      </div>
    </div>

    <!-- Step 2: Date -->
    <div class="step" id="step-2">
      <div class="section-title"><span class="emoji">📅</span> Izberite datum</div>
      <div class="calendar-header">
        <button class="cal-nav" id="cal-prev" onclick="changeMonth(-1)">‹</button>
        <span class="cal-month" id="cal-month-label"></span>
        <button class="cal-nav" id="cal-next" onclick="changeMonth(1)">›</button>
      </div>
      <div class="calendar-grid" id="calendar-grid">
        <div class="loader">Nalagam termine</div>
      </div>
    </div>

    <!-- Step 3: Time -->
    <div class="step" id="step-3">
      <div class="section-title"><span class="emoji">⏰</span> Izberite uro</div>
      <p style="font-size:0.85rem;color:var(--muted);margin-bottom:16px;" id="times-date-label"></p>
      <div class="times-grid" id="times-list"></div>
      <button class="btn btn-secondary" onclick="goStep(2)" style="margin-top:16px;">← Nazaj</button>
    </div>

    <!-- Step 4: Contact info -->
    <div class="step" id="step-4">
      <div class="section-title"><span class="emoji">👤</span> Vaši podatki</div>
      <div class="summary-card" id="booking-summary"></div>
      <div class="form-group">
        <label>Ime in priimek</label>
        <input type="text" id="inp-name" placeholder="npr. Ana Novak" autocomplete="name">
      </div>
      <div class="form-group">
        <label>Telefonska številka</label>
        <input type="tel" id="inp-phone" placeholder="npr. 041 123 456" autocomplete="tel">
      </div>
      <button class="btn btn-primary" onclick="submitBooking()" id="btn-submit">Potrdi rezervacijo</button>
      <button class="btn btn-secondary" onclick="goStep(3)">← Nazaj</button>
    </div>

    <!-- Step 5: Success -->
    <div class="step" id="step-5">
      <div class="success-screen">
        <div class="success-icon">✅</div>
        <h2>Rezervacija poslana!</h2>
        <p>Salon vas bo potrdil v kratkem.<br>Preboste WA obvestilo na vaš telefon.</p>
        <div class="ref-badge" id="success-ref">REF</div>
        <div class="summary-card" id="success-summary"></div>
        <button class="btn btn-primary" onclick="resetFlow()" style="margin-top:8px;">+ Nova rezervacija</button>
      </div>
    </div>

  </div><!-- /tab-book -->

  <!-- ══════ MY BOOKINGS ══════ -->
  <div id="tab-my" class="my-bookings">
    <div class="phone-lookup">
      <div class="section-title" style="margin-top:24px;"><span class="emoji">📋</span> Moje rezervacije</div>
      <div class="form-group">
        <label>Vnesi svojo telefonsko številko</label>
        <input type="tel" id="my-phone" placeholder="npr. 041 123 456" autocomplete="tel">
      </div>
      <button class="btn btn-primary" onclick="loadMyBookings()">Poišči rezervacije</button>
    </div>
    <div id="my-bookings-list"></div>
  </div>

</div><!-- /container -->

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────
let state = {
  step: 1,
  serviceId: null, serviceName: '', servicePrice: '', serviceDuration: '',
  date: null, time: null,
  availableDates: [],  // [{date, count}]
  calYear: null, calMonth: null
};

const MONTHS_SL = ['Januar','Februar','Marec','April','Maj','Junij','Julij','Avgust','September','Oktober','November','December'];
const DAYS_SL = ['Ned','Pon','Tor','Sre','Čet','Pet','Sob'];

// ── Init ───────────────────────────────────────────────────────
(async () => {
  try {
    const r = await fetch('/api/book/info');
    const data = await r.json();
    document.getElementById('salon-title').textContent = data.salon.name || 'Naročanje';
    document.getElementById('salon-subtitle').textContent = data.salon.name || '';
    document.title = (data.salon.name || 'Naročanje') + ' — Rezervacija';
    renderServices(data.services || []);
  } catch (e) {
    document.getElementById('services-list').innerHTML = '<p style="color:var(--red)">Napaka pri nalaganju storitev.</p>';
  }
  // Load available dates
  loadDates();
})();

async function loadDates() {
  try {
    const r = await fetch('/api/book/dates');
    state.availableDates = await r.json();
  } catch (e) { state.availableDates = []; }
}

// ── Services ───────────────────────────────────────────────────
function renderServices(services) {
  const el = document.getElementById('services-list');
  if (!services.length) { el.innerHTML = '<p style="color:var(--muted)">Ni razpoložljivih storitev.</p>'; return; }
  el.innerHTML = services.map(s => `
    <div class="service-card" onclick="selectService('${s.id}','${escHtml(s.name)}','${s.price}','${s.duration_minutes}')" id="svc-${s.id}">
      <div class="svc-info">
        <h3>${escHtml(s.name)}</h3>
        <p>⏱ ${s.duration_minutes} min</p>
      </div>
      <div class="svc-price">${s.price} €</div>
    </div>
  `).join('');
}

function selectService(id, name, price, duration) {
  document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('svc-' + id)?.classList.add('selected');
  state.serviceId = id; state.serviceName = name;
  state.servicePrice = price; state.serviceDuration = duration;
  setTimeout(() => goStep(2), 250);
}

// ── Calendar ───────────────────────────────────────────────────
function goStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step-' + n)?.classList.add('active');
  // Update dots
  for (let i = 1; i <= 4; i++) {
    const dot = document.getElementById('dot-' + i);
    if (!dot) continue;
    dot.classList.remove('active','done');
    if (i < n) dot.classList.add('done');
    else if (i === n) dot.classList.add('active');
  }
  document.getElementById('step-label').innerHTML = `Korak <strong>${Math.min(n,4)}</strong> od 4`;
  state.step = n;
  if (n === 2) renderCalendar();
  if (n === 4) renderSummary();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderCalendar() {
  const now = new Date();
  if (!state.calYear) { state.calYear = now.getFullYear(); state.calMonth = now.getMonth(); }
  const y = state.calYear, m = state.calMonth;
  document.getElementById('cal-month-label').textContent = `${MONTHS_SL[m]} ${y}`;

  // Prev button disable if current month
  document.getElementById('cal-prev').disabled = (y === now.getFullYear() && m === now.getMonth());

  const availSet = new Set(state.availableDates.map(d => d.date));
  const today = now.toISOString().split('T')[0];

  const firstDay = new Date(y, m, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  // Week starts Monday (1), shift: Sun=6, Mon=0,...
  const startOffset = (firstDay + 6) % 7;

  let html = DAYS_SL.map(d => `<div class="cal-day-header">${d}</div>`).join('');

  for (let i = 0; i < startOffset; i++) html += '<div class="cal-day empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === today;
    const isAvail = availSet.has(dateStr);
    const isPast = dateStr < today;
    const isSelected = dateStr === state.date;

    let cls = 'cal-day';
    if (isPast) cls += ' unavailable';
    else if (isAvail) cls += ' available';
    else cls += ' unavailable';
    if (isToday) cls += ' today';
    if (isSelected) cls += ' selected';

    const click = isAvail ? `onclick="selectDate('${dateStr}')"` : '';
    html += `<div class="${cls}" ${click}>${d}</div>`;
  }

  document.getElementById('calendar-grid').innerHTML = html;
}

function changeMonth(dir) {
  const now = new Date();
  state.calMonth += dir;
  if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
  if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
  // Don't go before current month
  if (state.calYear < now.getFullYear() || (state.calYear === now.getFullYear() && state.calMonth < now.getMonth())) {
    state.calMonth = now.getMonth(); state.calYear = now.getFullYear();
  }
  renderCalendar();
}

async function selectDate(dateStr) {
  state.date = dateStr;
  renderCalendar();
  // Load times
  document.getElementById('times-list').innerHTML = '<div class="loader">Nalagam ure</div>';
  const d = new Date(dateStr + 'T12:00:00');
  document.getElementById('times-date-label').textContent =
    `${d.getDate()}. ${MONTHS_SL[d.getMonth()]} ${d.getFullYear()}`;
  goStep(3);
  try {
    const r = await fetch(`/api/book/times?date=${dateStr}`);
    const times = await r.json();
    if (!times.length) {
      document.getElementById('times-list').innerHTML = '<p style="color:var(--muted)">Na ta dan ni več prostih terminov.</p>';
    } else {
      document.getElementById('times-list').innerHTML = times.map(t => `
        <div class="time-chip ${t===state.time?'selected':''}" onclick="selectTime('${t}')">${t}</div>
      `).join('');
    }
  } catch (e) {
    document.getElementById('times-list').innerHTML = '<p style="color:var(--red)">Napaka pri nalaganju ur.</p>';
  }
}

function selectTime(t) {
  state.time = t;
  document.querySelectorAll('.time-chip').forEach(c => {
    c.classList.toggle('selected', c.textContent.trim() === t);
  });
  setTimeout(() => goStep(4), 200);
}

// ── Summary & Submit ───────────────────────────────────────────
function renderSummary() {
  const d = new Date((state.date || '') + 'T12:00:00');
  const fmtDate = state.date ? `${d.getDate()}. ${MONTHS_SL[d.getMonth()]} ${d.getFullYear()}` : '—';
  document.getElementById('booking-summary').innerHTML = `
    <div class="summary-row"><span class="summary-label">📅 Storitev</span><span class="summary-val">${escHtml(state.serviceName)}</span></div>
    <div class="summary-row"><span class="summary-label">📅 Datum</span><span class="summary-val">${fmtDate}</span></div>
    <div class="summary-row"><span class="summary-label">⏰ Ura</span><span class="summary-val">${state.time || '—'}</span></div>
    <div class="summary-row"><span class="summary-label">💰 Cena</span><span class="summary-val">${state.servicePrice} €</span></div>
  `;
}

async function submitBooking() {
  const name = document.getElementById('inp-name').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  if (!name) { showToast('Vpišite ime in priimek', 'error'); return; }
  if (!phone || phone.replace(/[^\d]/g,'').length < 8) { showToast('Vpišite veljavno telefonsko številko', 'error'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = 'Pošiljam…';

  try {
    const r = await fetch('/api/book', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        serviceId: state.serviceId,
        date: state.date,
        time: state.time,
        customerName: name,
        customerPhone: phone
      })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Napaka pri rezervaciji');

    // Success
    const d = new Date((state.date || '') + 'T12:00:00');
    const fmtDate = `${d.getDate()}. ${MONTHS_SL[d.getMonth()]} ${d.getFullYear()}`;
    document.getElementById('success-ref').textContent = 'REF: ' + data.ref;
    document.getElementById('success-summary').innerHTML = `
      <div class="summary-row"><span class="summary-label">📅 Storitev</span><span class="summary-val">${escHtml(state.serviceName)}</span></div>
      <div class="summary-row"><span class="summary-label">📅 Datum</span><span class="summary-val">${fmtDate}</span></div>
      <div class="summary-row"><span class="summary-label">⏰ Ura</span><span class="summary-val">${state.time}</span></div>
      <div class="summary-row"><span class="summary-label">👤 Ime</span><span class="summary-val">${escHtml(name)}</span></div>
    `;
    goStep(5);
    // Refresh available dates
    loadDates();
  } catch (e) {
    showToast(e.message, 'error');
    btn.disabled = false; btn.textContent = 'Potrdi rezervacijo';
  }
}

function resetFlow() {
  state = { step: 1, serviceId: null, serviceName: '', servicePrice: '', serviceDuration: '',
    date: null, time: null, availableDates: state.availableDates, calYear: null, calMonth: null };
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-phone').value = '';
  goStep(1);
}

// ── My Bookings ────────────────────────────────────────────────
async function loadMyBookings() {
  const phone = document.getElementById('my-phone').value.trim().replace(/[^\d]/g,'');
  if (phone.length < 8) { showToast('Vpišite veljavno telefonsko številko', 'error'); return; }

  const el = document.getElementById('my-bookings-list');
  el.innerHTML = '<div class="loader">Iščem rezervacije</div>';

  try {
    const r = await fetch(`/api/book/my?phone=${phone}`);
    const bookings = await r.json();
    if (!r.ok) throw new Error(bookings.error || 'Napaka');

    if (!bookings.length) {
      el.innerHTML = '<div class="empty-state"><span class="emoji">📭</span>Ni prihodnjih rezervacij za to številko.</div>';
      return;
    }

    el.innerHTML = bookings.map(b => {
      const d = new Date(b.date + 'T12:00:00');
      const fmtDate = `${d.getDate()}. ${MONTHS_SL[d.getMonth()]} ${d.getFullYear()}`;
      const canCancel = b.status !== 'cancelled' && b.date >= new Date().toISOString().split('T')[0];
      return `
        <div class="booking-card" id="card-${b.ref}">
          <div class="booking-top">
            <div>
              <div class="booking-date">📅 ${fmtDate}</div>
              <div class="booking-time">⏰ ${b.time}</div>
              <div class="booking-ref">Ref: ${b.ref}</div>
            </div>
            <span class="status-badge ${b.status}">${statusLabel(b.status)}</span>
          </div>
          ${canCancel ? `<button class="btn-cancel-booking" onclick="cancelBooking('${b.ref}','${phone}')">Odpovej termin</button>` : ''}
        </div>
      `;
    }).join('');
  } catch (e) {
    el.innerHTML = `<p style="color:var(--red);text-align:center;">${e.message}</p>`;
  }
}

async function cancelBooking(ref, phone) {
  if (!confirm(`Res želite odpovedati rezervacijo ${ref}?`)) return;
  try {
    const r = await fetch('/api/book/cancel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ref, phone })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Napaka');
    showToast('Rezervacija odpovedana', 'success');
    // Update card
    const card = document.getElementById('card-' + ref);
    if (card) {
      card.querySelector('.status-badge').className = 'status-badge cancelled';
      card.querySelector('.status-badge').textContent = 'Odpovedano';
      const cancelBtn = card.querySelector('.btn-cancel-booking');
      if (cancelBtn) cancelBtn.remove();
    }
  } catch (e) {
    showToast(e.message, 'error');
  }
}

// ── Tab switcher ───────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='book')||(i===1&&tab==='my')));
  document.getElementById('tab-book').style.display = tab === 'book' ? 'block' : 'none';
  const myEl = document.getElementById('tab-my');
  myEl.style.display = tab === 'my' ? 'block' : 'none';
  myEl.classList.toggle('active', tab === 'my');
}

// ── Helpers ────────────────────────────────────────────────────
function statusLabel(s) {
  return s === 'pending' ? '⏳ V čakanju' : s === 'confirmed' ? '✅ Potrjeno' : '❌ Odpovedano';
}
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init tab display
document.getElementById('tab-book').style.display = 'block';
document.getElementById('tab-my').style.display = 'none';
</script>
</body>
</html>
