<!DOCTYPE html>
<html lang="sl">
<head>
<script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowTiq — Nastavitev gesla</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --bg2: #1a1a2e;
      --bg3: #252540;
      --border: #2a2a4a;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --accent: #7c3aed;
      --accent2: #4f46e5;
      --success: #10b981;
      --error: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }
    .logo {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .tagline { font-size: 13px; color: var(--text3); margin-bottom: 36px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 32px; line-height: 1.5; }
    .form-group { margin-bottom: 20px; text-align: left; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: var(--accent); }
    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .msg {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .msg.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    .msg.show { display: block; }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state { display: none; }
    .invalid-state { display: none; }
    #setup-form { display: none; }
    .hint { font-size: 12px; color: var(--text3); margin-top: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">FlowTiq</div>
    <div class="tagline">Pametni AI asistent za rezervacije</div>

    <!-- Loading -->
    <div id="loading-state">
      <div class="spinner"></div>
      <p style="color:var(--text2);margin-top:16px;font-size:14px;">Preverjam link...</p>
    </div>

    <!-- Invalid token -->
    <div id="invalid-state" style="display:none;">
      <h1>❌ Neveljaven link</h1>
      <p class="subtitle">Ta link je neveljaven ali je že potekel.<br>Kontaktirajte FlowTiq za novo povabilo.</p>
      <a href="mailto:info@flowtiq.si" style="color:var(--accent);font-size:14px;">info@flowtiq.si</a>
    </div>

    <!-- Setup form -->
    <div id="setup-form">
      <h1>Nastavite geslo</h1>
      <p class="subtitle" id="welcome-msg">Dobrodošli! Nastavite geslo za dostop do vašega FlowTiq dashboarda.</p>

      <div class="form-group">
        <label>Novo geslo</label>
        <input type="password" id="password" placeholder="Najmanj 8 znakov" autocomplete="new-password">
        <div class="hint">Vsaj 8 znakov</div>
      </div>
      <div class="form-group">
        <label>Ponovite geslo</label>
        <input type="password" id="password2" placeholder="Ponovite geslo" autocomplete="new-password">
      </div>

      <button class="btn" id="submit-btn" onclick="submitSetup()">Nastavi geslo →</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    async function init() {
      if (!token) {
        showInvalid();
        return;
      }
      try {
        const res = await fetch(`/api/owner/setup-check?token=${encodeURIComponent(token)}`);
        const data = await res.json();
        if (!res.ok || !data.valid) { showInvalid(); return; }

        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('setup-form').style.display = 'block';
        const name = data.owner_name || data.salon_name || '';
        if (name) {
          document.getElementById('welcome-msg').textContent =
            `Pozdravljeni, ${name}! Nastavite geslo za dostop do vašega FlowTiq dashboarda.`;
        }
      } catch (e) {
        showInvalid();
      }
    }

    function showInvalid() {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('invalid-state').style.display = 'block';
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = `msg ${type} show`;
    }

    async function submitSetup() {
      const pw = document.getElementById('password').value;
      const pw2 = document.getElementById('password2').value;

      if (pw.length < 8) { showMsg('Geslo mora imeti vsaj 8 znakov.', 'error'); return; }
      if (pw !== pw2) { showMsg('Gesli se ne ujemata.', 'error'); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch('/api/owner/setup-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pw })
        });
        const data = await res.json();
        if (res.ok) {
          showMsg('✅ Geslo nastavljeno! Preusmerjam...', 'success');
          if (data.token) localStorage.setItem('owner_token', data.token);
          setTimeout(() => { window.location.href = '/settings.html'; }, 1500);
        } else {
          showMsg(data.error || 'Napaka pri nastavitvi gesla.', 'error');
          btn.disabled = false;
          btn.innerHTML = 'Nastavi geslo →';
        }
      } catch (e) {
        showMsg('Napaka: ' + e.message, 'error');
        btn.disabled = false;
        btn.innerHTML = 'Nastavi geslo →';
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitSetup();
    });

    init();
  </script>
</body>
</html>
